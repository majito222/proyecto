<section class="nueva-page">
  <p-card>
    <ng-template pTemplate="title">
      <span class="title"><i class="pi pi-plus"></i> Nueva solicitud</span>
    </ng-template>

    <form [formGroup]="solicitudForm" (ngSubmit)="crear()">
      <p-fluid>
        <p-iftalabel>
          <p-select inputId="canal" formControlName="canal" [options]="canales" />
          <label for="canal">Canal</label>
        </p-iftalabel>

        <p-iftalabel>
          <p-select inputId="tipo" formControlName="tipo" [options]="tipos" />
          <label for="tipo">Tipo</label>
        </p-iftalabel>

        <p-iftalabel>
          <textarea pTextarea id="descripcion" rows="5" formControlName="descripcion"></textarea>
          <label for="descripcion">Descripcion</label>
        </p-iftalabel>

        <div class="ai-priority">
          <span class="ai-priority__label">Prioridad IA</span>
          <p-tag [severity]="tagPrioridad(prioridadSugerida().prioridad)" [value]="prioridadSugerida().prioridad" />
          <span>{{ prioridadSugerida().justificacion }}</span>
        </div>

        @if (result()) {
          <p-message severity="error" [text]="result() ?? ''" />
        }

        <p-button type="submit" label="Crear solicitud" icon="pi pi-plus" [loading]="isLoading()" [disabled]="!canSubmit()" />
      </p-fluid>
    </form>
  </p-card>
</section>
