<header class="app-shell__header">
  <a class="brand" routerLink="/">
    <span class="brand__mark">ST</span>
    <span>Sistema de Triage</span>
  </a>

  <nav class="nav">
    <a routerLink="/" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }">Inicio</a>
    <a routerLink="/nueva-solicitud" routerLinkActive="is-active">Nueva solicitud</a>
    <a routerLink="/lista-solicitudes" routerLinkActive="is-active">Solicitudes</a>
    @if (auth.hasAnyRole(['ADMINISTRADOR'])) {
      <a routerLink="/admin" routerLinkActive="is-active">Admin</a>
    }
    @if (auth.isAuthenticated()) {
      <span class="session-role">Ingreso: {{ auth.sessionLabel() }}</span>
      <p-button label="Salir" severity="secondary" size="small" (onClick)="auth.logout()" />
    } @else {
      <a routerLink="/login" routerLinkActive="is-active">Login</a>
    }
  </nav>
</header>

<main class="app-shell__main">
  <router-outlet />
</main>
