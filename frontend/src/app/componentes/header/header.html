<nav class="navbar navbar-expand-md shadow-sm" style="background-color: #212529; margin: 12px 16px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.08);">
  <div class="container">
    <a routerLink="/" class="navbar-brand d-flex align-items-center gap-2" style="color: white; font-weight: 700;">
      <div style="background: #2563eb; width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white;">
        <i class="fa-solid fa-file-alt"></i>
      </div>
      <span>Solicitudes UQ</span>
    </a>

    <button class="navbar-toggler" type="button"
      data-bs-toggle="collapse" data-bs-target="#navMenu"
      style="border-color: rgba(255,255,255,0.3);">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a routerLink="/" routerLinkActive="active"
            [routerLinkActiveOptions]="{exact:true}"
            class="nav-link" style="color: rgba(255,255,255,0.75);">
            <i class="fa-solid fa-home me-1"></i>Inicio
          </a>
        </li>
        @if (isLoggedIn()) {
          <li class="nav-item">
            <a routerLink="/lista-solicitudes" routerLinkActive="active"
              class="nav-link" style="color: rgba(255,255,255,0.75);">
              <i class="fa-solid fa-list me-1"></i>Mis Solicitudes
            </a>
          </li>
        }
      </ul>

      <div class="d-flex gap-2">
        @if (isLoggedIn()) {
          <button class="btn btn-outline-danger btn-sm" (click)="cerrarSesion()">
            <i class="fa-solid fa-right-from-bracket me-1"></i>Cerrar Sesión
          </button>
        } @else {
          <a routerLink="/login" class="btn btn-outline-light btn-sm">
            <i class="fa-solid fa-right-to-bracket me-1"></i>Ingresar
          </a>
          <a routerLink="/registro" class="btn btn-primary btn-sm">
            Registrarse
          </a>
        }
      </div>
    </div>
  </div>
</nav>
