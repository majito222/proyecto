spring.application.name=proyecto
server.port=8081

# Swagger / OpenAPI
springdoc.api-docs.resolve-schema-properties=true
springdoc.override-with-generic-response=false
springdoc.swagger-ui.path=/swagger-ui.html

# H2 + JPA
spring.datasource.url=jdbc:h2:mem:triage;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Logs
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

spring.main.allow-circular-references=true

# JWT SEGURIDAD
jwt.expiry=15
jwt.secret=MiClaveSecretaSuperSeguraParaJWT2026EnProgramacionAvanzadaUniquindio

# Usuarios por defecto
app.default-users.users[0].email=admin@solicitudes.com
app.default-users.users[0].password=admin123
app.default-users.users[0].tipo=ADMIN

app.default-users.users[1].email=agente@solicitudes.com
app.default-users.users[1].password=agente123
app.default-users.users[1].tipo=USER